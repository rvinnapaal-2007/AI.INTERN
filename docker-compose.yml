services:
  db:
    image: postgres:16-alpine
    container_name: pdfchat_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pdfchat_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdfchat_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
    volumes:
      - ./backend/documents:/app/documents
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pdfchat_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pdfchat_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pdfchat_net

volumes:
  pgdata:

networks:
  pdfchat_net:
    driver: bridge